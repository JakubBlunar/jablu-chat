<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1f22" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Jablu — real-time chat with servers, DMs, voice channels and more." />
    <meta property="og:title" content="Jablu" />
    <meta property="og:description" content="Real-time chat with servers, DMs, voice channels and more." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/apple-touch-icon.png" />
    <title>Jablu</title>
  </head>
  <body>
    <div id="landscape-lock" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2" />
        <path d="M12 18h.01" />
      </svg>
      <p style="font-size:15px;font-weight:500;text-align:center">Please rotate your device<br/>to portrait mode</p>
    </div>
    <script>
    (function(){
      if(navigator.userAgent.indexOf('Electron')!==-1)return;
      if(!('ontouchstart' in window))return;
      var el=document.getElementById('landscape-lock');
      function check(){
        var landscape=window.innerWidth>window.innerHeight&&window.innerHeight<600;
        if(landscape&&!el.dataset.disabled)el.classList.add('active');
        else el.classList.remove('active');
      }
      check();
      window.addEventListener('resize',check);
      window.addEventListener('orientationchange',function(){setTimeout(check,100)});
      window.__landscapeLock={disable:function(){el.dataset.disabled='1';el.classList.remove('active')},enable:function(){delete el.dataset.disabled;check()}};
    })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
