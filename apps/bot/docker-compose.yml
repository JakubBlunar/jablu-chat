services:
  freegamebot:
    build:
      context: ../..
      dockerfile: apps/bot/Dockerfile
    container_name: freegamebot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
