# Traefik override — use alongside docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# This removes public ports from nginx and adds Traefik routing labels.
# Traefik must already be running on the "web" network (see DEPLOYMENT.md).

services:
  nginx:
    ports: !override []
    networks:
      - default
      - web
    labels:
      - 'traefik.enable=true'

      # Main router — all traffic for this host
      - 'traefik.http.routers.jablu.rule=Host(`${SERVER_HOST}`)'
      - 'traefik.http.routers.jablu.entrypoints=websecure'
      - 'traefik.http.routers.jablu.tls.certresolver=letsencrypt'
      - 'traefik.http.services.jablu.loadbalancer.server.port=80'
      - 'traefik.http.routers.jablu.middlewares=jablu-errors@docker'

      # Error pages middleware — shows maintenance page when Nginx is down
      - 'traefik.http.middlewares.jablu-errors.errors.status=502-504'
      - 'traefik.http.middlewares.jablu-errors.errors.service=jablu-maintenance@docker'
      - 'traefik.http.middlewares.jablu-errors.errors.query=/'

      # Admin rate-limit router — strict throttle on /api/admin
      - 'traefik.http.routers.jablu-admin.rule=Host(`${SERVER_HOST}`) && PathPrefix(`/api/admin`)'
      - 'traefik.http.routers.jablu-admin.entrypoints=websecure'
      - 'traefik.http.routers.jablu-admin.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.jablu-admin.service=jablu'
      - 'traefik.http.routers.jablu-admin.priority=200'
      - 'traefik.http.routers.jablu-admin.middlewares=admin-ratelimit@docker'

      # Rate limit: 10 req/s average, burst up to 20
      - 'traefik.http.middlewares.admin-ratelimit.ratelimit.average=10'
      - 'traefik.http.middlewares.admin-ratelimit.ratelimit.burst=20'
      - 'traefik.http.middlewares.admin-ratelimit.ratelimit.period=1s'
      - 'traefik.http.middlewares.admin-ratelimit.ratelimit.sourceCriterion.ipStrategy.depth=1'

  # Tiny static server for Traefik error pages (stays running during deploys)
  maintenance:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/maintenance.html:/usr/share/nginx/html/index.html:ro
    networks:
      - web
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.jablu-maintenance.loadbalancer.server.port=80'
      # No routers — only reachable as an error service
    restart: unless-stopped

networks:
  web:
    external: true
