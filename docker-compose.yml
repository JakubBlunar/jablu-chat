services:
  # ─── Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    build: ./docker/nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/certs:/etc/nginx/certs
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      - web-dist:/usr/share/nginx/html:ro
      - uploads:/data/uploads:ro
    environment:
      - TLS_MODE=${TLS_MODE:-off}
      - SERVER_HOST=${SERVER_HOST:-localhost}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── API Server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - UPLOAD_DIR=/data/uploads
      - UPDATES_DIR=/data/updates
      - DOWNLOADS_DIR=/data/downloads
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@chat.local}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - TLS_MODE=${TLS_MODE:-off}
      - PORT=3001
      - SUPERADMIN_USERNAME=${SUPERADMIN_USERNAME:-}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD:-}
      - REGISTRATION_MODE=${REGISTRATION_MODE:-open}
      - STORAGE_LIMIT_GB=${STORAGE_LIMIT_GB:-100}
      - CLEANUP_ENABLED=${CLEANUP_ENABLED:-false}
      - CLEANUP_CRON=${CLEANUP_CRON:-0 3 * * *}
      - CLEANUP_MIN_AGE_DAYS=${CLEANUP_MIN_AGE_DAYS:-90}
      - CLEANUP_DELETE_MESSAGES=${CLEANUP_DELETE_MESSAGES:-false}
      - CLEANUP_ORPHAN_HOURS=${CLEANUP_ORPHAN_HOURS:-24}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - GIPHY_API_KEY=${GIPHY_API_KEY:-}
    volumes:
      - uploads:/data/uploads
      - updates:/data/updates
      - downloads:/data/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Web App Build ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    volumes:
      - web-dist:/output
    restart: 'no'

  # ─── Database Migration ─────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: migrate
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-chat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-chat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chat}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── LiveKit ────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.10.0
    ports:
      - '7882:7882/udp'
      - '50000-50100:50000-50100/udp'
    environment:
      - 'LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret}'
    command: --config /etc/livekit.yaml
    volumes:
      - ./docker/livekit/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # ─── Mailpit (dev only) ────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit
    ports:
      - '8025:8025'
    restart: unless-stopped
    profiles:
      - dev

volumes:
  pgdata:
  redisdata:
  uploads:
  updates:
  downloads:
  web-dist:
  letsencrypt:
  certbot-webroot:
